# 应用设置
app:
  name: "local-knowledge-base"
  version: "1.0.0"
  environment: "${ENVIRONMENT:-development}"
  debug: false
  log_level: "${LOG_LEVEL:-INFO}"

# 数据路径
paths:
  data_dir: "${DATA_DIR:-./data}"
  raw_docs: "${RAW_DOCS_DIR:-${paths.data_dir}/raw_docs}"
  processed: "${PROCESSED_DIR:-${paths.data_dir}/processed}"
  vector_store: "${VECTOR_STORE_DIR:-${paths.data_dir}/vector_store}"
  logs: "./logs"

# 文档处理
document_processing:
  supported_formats:
    - "pdf"
    - "docx"
    - "txt"
    - "md"
    - "html"
    - "csv"
  
  chunking:
    chunk_size: "${CHUNK_SIZE:-800}"
    chunk_overlap: "${CHUNK_OVERLAP:-100}"
    max_chunks_per_doc: "${MAX_CHUNKS_PER_DOC:-100}"
    # 父子分块配置（父块提供完整上下文，子块用于精准检索）
    use_parent_child: true          # 设为 true 以启用父子分块模式
    use_semantic: false             # 启用语义分块（优先级高于 use_parent_child）
    parent_chunk_size: 1500          # 父块大小（字符数）
    child_chunk_size: 400            # 子块大小（字符数）

    # 语义分块配置
    semantic:
      breakpoint_threshold: 0.3      # embedding 相似度断点阈值（越低切分越少）
      min_chunk_size: 200            # 最小 chunk 字符数
      max_chunk_size: 1000           # 最大 chunk 字符数
    
  text_splitter:
    type: "recursive_character"
    separators: ["\n\n", "\n", "。", "？", "！", "；", "?", "!", ";", "…", "……"]
    keep_separator: true
    
  # 简单文档使用预处理，Markdown关闭预处理以保护公式
  preprocessing:
    remove_extra_whitespace: true
    normalize_unicode: true
    handle_mixed_language: true
    
    # Markdown文档专用配置（保护公式）
    markdown:
      enabled: true
      # 跳过破坏性预处理
      skip_whitespace_normalize: true
      skip_unicode_normalize: true
      skip_mixed_language: true
      # 使用语义分块
      use_semantic_chunking: true

  # 简单文档格式（使用传统预处理）
  simple_formats:
    - "pdf"
    - "txt"
    - "docx"
    - "html"
    - "csv"

# MinerU API配置（用于PDF转Markdown）
mineru:
  enabled: false  # 是否启用MinerU API
  api_token: "${MINERU_API_TOKEN:-}"  # API Token，有效期3个月
  # API调用配置
  convert:
    is_ocr: false  # 是否启用OCR
    enable_formula: true  # 是否启用公式识别
    enable_table: true  # 是否启用表格识别
    language: "ch"  # 文档语言
    model_version: "vlm"  # 模型版本
    max_wait_seconds: 300  # 最大等待时间（秒）
    poll_interval: 5  # 轮询间隔（秒）
  # PDF文件需要通过公网URL访问，请配置文件服务器或使用其他方式上传

# 向量存储
vector_store:
  type: "${VECTOR_DB_TYPE:-chroma}"
  
  chroma:
    persist_directory: "${CHROMA_PERSIST_DIR:-${paths.vector_store}/chroma}"
    collection_name: "${CHROMA_COLLECTION_NAME:-knowledge_base}"
    embedding_function: "bge-m3"
    
  qdrant:
    url: "http://localhost:6333"
    collection_name: "knowledge_base"
    prefer_grpc: false
    
  faiss:
    index_path: "${paths.vector_store}/faiss.index"
    index_type: "IndexFlatIP"

# 嵌入模型
embeddings:
  # 国内环境推荐使用 text2vec-chinese-sentence (约400MB)
  # 如需更高质量可使用 BAAI/bge-m3 (需配置镜像)
  model: "${EMBEDDING_MODEL:-shibing624/text2vec-chinese-sentence}"
  device: "cpu"
  batch_size: 32
  normalize_embeddings: true
  max_length: 512
  
  # HuggingFace 镜像配置（解决国内网络问题）
  hf_mirror: "${HF_MIRROR:-https://hf-mirror.com}"
  
  cache:
    enabled: true
    ttl_seconds: 3600
    max_size_mb: 1000

# RAG配置
rag:
  retriever:
    type: "hybrid"  # hybrid, dense, sparse — 由 RAGChain._retrieve_documents 读取
    top_k: 10       # 由 RAGChain 读取
    score_threshold: 0.5  # 最低相似度阈值（L2距离已转换为相似度），由 RAGChain 读取

    sparse:
      bm25_k1: 1.5  # 由 SimpleVectorStore._get_bm25_index 读取
      bm25_b: 0.75  # 由 SimpleVectorStore._get_bm25_index 读取

    hybrid:
      dense_weight: 0.7  # 由 RAGChain 读取
      sparse_weight: 0.3  # 由 RAGChain 读取

    # 父子上下文检索（需要文档以父子分块方式摄入）
    parent_child:
      enabled: false  # 设为 true 以启用父子上下文检索

    # 多查询检索（用 LLM 生成查询变体，提升召回率）
    multi_query:
      enabled: false  # 设为 true 以启用多查询检索
      num_queries: 3  # 生成查询变体数量
  
  reranking:
    enabled: false  # 禁用重排序（需要下载bge-reranker-large模型）
    model: "${RERANKER_MODEL:-BAAI/bge-reranker-large}"
    top_n: 3
    
  # 跨语言搜索配置
  cross_lingual:
    enabled: true  # 启用跨语言搜索（中文查询英文文档）
    translation_enabled: true  # 启用Query翻译
    cache_size: 100  # QueryTranslator LRU 缓存条数

  # CRAG（Corrective RAG）配置
  corrective:
    enabled: true             # 启用检索质量自评估+失败重试
    quality_threshold: 0.3    # 关键词覆盖率阈值（低于此值触发改写重试）
    max_retries: 1            # 最大改写重试次数

  # 对话历史感知检索（History-Aware Retrieval）
  history_aware:
    enabled: true               # 启用查询改写：将指代性问题改写为独立查询
    max_history_for_rewrite: 5  # 参与改写的历史轮数

  # 对话历史管理
  history:
    max_turns: 20               # 历史硬上限（防止极端情况）
    token_budget_ratio: 0.25    # 历史占可用 token 比例（P1 动态窗口）
    summary_threshold: 10       # 超过此轮数时，旧历史压缩为摘要（P2）

  # 答案溯源验证
  citation_verification:
    enabled: true             # 启用引用编号校验（检查[文档N]是否真实存在）
    warn_on_invalid: true     # 对无效引用在答案末尾追加警告
    
  generation:
    prompt_template: |
      基于以下参考文档回答用户问题。请确保答案准确、完整，并注明引用来源。
      
      参考文档：
      {context}
      
      用户问题：{question}
      
      请用中文回答：
    temperature: 0.1
    max_tokens: 2000
    streaming: true

# Agent配置
agents:
  enabled: "${ENABLE_AGENTS:-true}"

  # 默认 Agent 类型: rag_agent | multi_step_rag_agent | research_agent
  default_agent_type: "rag_agent"

  base_agent:
    max_iterations: "${AGENT_MAX_ITERATIONS:-5}"
    early_stopping: true
    reflection_enabled: true

  multi_step_agent:
    max_iterations: 8
    # 触发多步推理的问题字数阈值（超过此字数的问题才启用问题分解）
    complexity_threshold: 30

  tools:
    # 已启用工具列表（按优先级排序）
    enabled_tools:
      - "hybrid_search"          # 混合搜索（推荐，替代原 retrieval）
      - "parent_context_search"  # 父子上下文检索
      - "decompose_query"        # 查询分解（复杂问题）
      - "knowledge_summary"      # 知识库主题摘要
      - "retrieve_documents"     # 带分数检索
      - "search_knowledge"       # 基础向量搜索（兜底）
      - "list_documents"         # 文档列表
      - "calculate"              # 计算器
      - "read_file"              # 文件读取

    retrieval:
      top_k: 5
      include_sources: true

    hybrid_search:
      top_k: 5
      dense_weight: 0.7
      sparse_weight: 0.3

    calculator:
      precision: 4

    web_search:
      max_results: 3
      timeout: 10

# LLM配置
llm:
  # 默认模式：auto, local_only, api_only, local_first
  default_mode: "auto"
  
  local:
    provider: "ollama"
    
    ollama:
      base_url: "http://localhost:11434"
      model: "deepseek-v2:lite"
      temperature: 0.1
      context_window: 64000
      num_predict: 1024
      streaming: true
      
    vllm:
      api_url: "http://localhost:8000/v1"
      model: "Qwen/Qwen2.5-7B-Instruct"
      tensor_parallel_size: 1
      
    transformers:
      model_path: "Qwen/Qwen2.5-7B-Instruct"
      device_map: "auto"
      load_in_4bit: true
  
  api:
    enabled: true
    default_provider: "deepseek"
    fallback_enabled: true
    
    openai:
      api_key: "${OPENAI_API_KEY}"
      model: "gpt-4o-mini"
      base_url: "https://api.openai.com/v1"
      max_tokens: 2000
      temperature: 0.1
      
    deepseek:
      api_key: "${DEEPSEEK_API_KEY}"
      model: "deepseek-chat"
      base_url: "https://api.deepseek.com"
      max_tokens: 2000
      temperature: 0.1
      
    kimi:
      api_key: "${KIMI_API_KEY}"
      model: "moonshot-v1-8k-vision-preview"
      base_url: "https://api.moonshot.cn/v1"
      max_tokens: 2000
      temperature: 0.1
      
    anthropic:
       api_key: "${ANTHROPIC_API_KEY}"
       model: "claude-3-haiku-20240307"
       max_tokens: 2000
    
  routing:
    rules:
      - condition: "query.requires_realtime_info"
        action: "use_api"
        priority: 1
        
      - condition: "query.complexity > 0.8"
        action: "use_api"
        priority: 2
        
      - condition: "context_length > 32000"
        action: "use_api"
        priority: 3
        
      - condition: "query.sensitivity == 'high'"
        action: "use_local"
        priority: 1
        
      - condition: "cost_today > budget_daily * 0.8"
        action: "use_local"
        priority: 2

# 成本控制
cost_control:
  enabled: true
  budget_daily: 10.0  # 美元
  auto_switch_to_local: true
  daily_api_limit: 50
  
  providers:
    openai:
      input_price_per_1k: 0.0015  # GPT-4o-mini 输入价格
      output_price_per_1k: 0.0060  # GPT-4o-mini 输出价格
      
    deepseek:
      input_price_per_1k: 0.00014
      output_price_per_1k: 0.00028
      
    anthropic:
      input_price_per_1k: 0.00080  # Claude 3 Haiku
      output_price_per_1k: 0.00400

# 服务器配置
server:
  api:
    host: "${API_HOST:-0.0.0.0}"
    port: "${API_PORT:-8000}"
    workers: 2
    reload: true
    
  frontend:
    streamlit:
      port: "${STREAMLIT_PORT:-8501}"
      theme: "light"
      
    gradio:
      port: 7860
      share: false

# 监控和日志
monitoring:
  enabled: true
  
  metrics:
    enable_prometheus: true
    port: 9090
    
  logging:
    file: "${paths.logs}/app.log"
    max_size_mb: 100
    backup_count: 5
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    
  health_check:
    endpoint: "/health"
    interval_seconds: 30

# 硬件配置
hardware:
  cuda:
    visible_devices: "${CUDA_VISIBLE_DEVICES:-0}"
    allow_tf32: true
    
  memory:
    max_gpu_memory: "${MAX_GPU_MEMORY:-10GB}"
    cpu_worker_threads: "${CPU_WORKER_THREADS:-6}"
    
  optimization:
    enable_flash_attention: true
    enable_tensor_parallel: false
    enable_paged_attention: true

# Agent 配置
agent:
  enabled: true
  classifier:
    fallback: "simple"         # 分类失败时的默认行为
  graph:
    max_iterations: 3          # 反思循环最大迭代次数